name: Build and Release LexiSync

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  APP_NAME: LexiSync
  APP_ID: lexisync
  PYTHON_STANDALONE_VERSION: '3.12.12'
  PYTHON_STANDALONE_RELEASE_TAG: '20251202'
  PYTHON_BUILD_VERSION: '3.12'
  NODE_VERSION: '20'
  PIP_EXTRA_INDEX_URL: https://pypi.org/simple
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Parse Version
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.ver.outputs.tag }}
      version_num: ${{ steps.ver.outputs.num }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version tag and bare number
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="v0.0.0-dev.$(git rev-parse --short HEAD)"
          fi
          NUM="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "num=${NUM}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Version::Building ${TAG} (${NUM})"

  test:
    name: Validate Build Inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web_src/package-lock.json

      - name: Build web frontend
        working-directory: ./web_src
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_BUILD_VERSION }}
          cache: pip

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Detect Python tests
        id: detect_tests
        shell: bash
        run: |
          if git ls-files '*.py' | grep -E '(^tests/.*\.py$|(^|/)(test_[^/]+|[^/]+_test)\.py$)' >/dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install test dependencies
        if: steps.detect_tests.outputs.has_tests == 'true'
        shell: bash
        run: |
          if [ -f requirements-test.txt ]; then
            pip install -r requirements-test.txt
          else
            pip install pytest pytest-cov
          fi

      - name: Run pytest with coverage
        if: steps.detect_tests.outputs.has_tests == 'true'
        shell: bash
        run: |
          pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q --tb=short

      - name: Run syntax sanity checks
        if: steps.detect_tests.outputs.has_tests != 'true'
        shell: bash
        run: |
          python -m compileall -q src tools

  build:
    name: Build - ${{ matrix.platform_name }}
    needs: [setup, test]
    runs-on: ${{ matrix.os_image }}
    env:
      VERSION_TAG: ${{ needs.setup.outputs.version_tag }}
      VERSION_NUM: ${{ needs.setup.outputs.version_num }}
      HAS_WIN_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: windows-x64
            os_image: windows-latest
            python_arch: x86_64-pc-windows-msvc
            arch_display: x64
          - platform_name: linux-x64
            os_image: ubuntu-22.04
            python_arch: x86_64-unknown-linux-gnu
            arch_display: x86_64
          - platform_name: macos-arm64
            os_image: macos-15
            arch_display: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web_src/package-lock.json

      - name: Build web frontend
        working-directory: ./web_src
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_BUILD_VERSION }}
          cache: pip

      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Install build dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download standalone Python runtime (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BASE="https://github.com/indygreg/python-build-standalone/releases/download"
          TAG="${{ env.PYTHON_STANDALONE_RELEASE_TAG }}"
          VER="${{ env.PYTHON_STANDALONE_VERSION }}"
          ARCH="${{ matrix.python_arch }}"
          URL="${BASE}/${TAG}/cpython-${VER}+${TAG}-${ARCH}-install_only_stripped.tar.gz"
          echo "Fetching: ${URL}"
          curl -fsSL "$URL" -o runtime.tar.gz
          tar -xzf runtime.tar.gz
          mv python python_minimal

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller `
            --name "${{ env.APP_NAME }}" `
            --windowed `
            --noupx `
            --noconfirm `
            --clean `
            --hidden-import "rapidfuzz" `
            --add-data "NOTICE;." `
            --add-data "LICENSE;." `
            --add-data "src/lexisync/resources;resources" `
            --add-data "src/lexisync/plugins;lexisync/plugins" `
            --exclude-module "Qt6Sql" `
            --exclude-module "Qt6Test" `
            --exclude-module "Qt6Xml" `
            --exclude-module "Qt6Qml" `
            --exclude-module "Qt6Quick" `
            --exclude-module "Qt6WebEngineWidgets" `
            --exclude-module "Qt6WebEngineCore" `
            --exclude-module "Qt6WebChannel" `
            --exclude-module "Qt6Positioning" `
            --exclude-module "Qt6Sensors" `
            --exclude-module "Qt6Nfc" `
            --exclude-module "Qt6Bluetooth" `
            --exclude-module "Qt6DataVisualization" `
            --exclude-module "Qt6Multimedia" `
            --exclude-module "tkinter" `
            --exclude-module "unittest" `
            --exclude-module "pdb" `
            --exclude-module "doctest" `
            --exclude-module "pydoc" `
            --exclude-module "turtle" `
            --exclude-module "test" `
            --exclude-module "lib2to3" `
            --exclude-module "scipy" `
            --exclude-module "matplotlib" `
            --exclude-module "IPython" `
            --exclude-module "jupyter" `
            --optimize 2 `
            src/lexisync/main.py

      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pyinstaller \
            --name "${{ env.APP_NAME }}" \
            --windowed \
            --noupx \
            --noconfirm \
            --clean \
            --hidden-import "rapidfuzz" \
            --add-data "NOTICE:." \
            --add-data "LICENSE:." \
            --add-data "src/lexisync/resources:resources" \
            --add-data "src/lexisync/plugins:lexisync/plugins" \
            --exclude-module "Qt6Sql" \
            --exclude-module "Qt6Test" \
            --exclude-module "Qt6Xml" \
            --exclude-module "Qt6Qml" \
            --exclude-module "Qt6Quick" \
            --exclude-module "Qt6WebEngineWidgets" \
            --exclude-module "Qt6WebEngineCore" \
            --exclude-module "Qt6WebChannel" \
            --exclude-module "Qt6Positioning" \
            --exclude-module "Qt6Sensors" \
            --exclude-module "Qt6Nfc" \
            --exclude-module "Qt6Bluetooth" \
            --exclude-module "Qt6DataVisualization" \
            --exclude-module "Qt6Multimedia" \
            --exclude-module "tkinter" \
            --exclude-module "unittest" \
            --exclude-module "pdb" \
            --exclude-module "doctest" \
            --exclude-module "pydoc" \
            --exclude-module "turtle" \
            --exclude-module "test" \
            --exclude-module "lib2to3" \
            --exclude-module "scipy" \
            --exclude-module "matplotlib" \
            --exclude-module "IPython" \
            --exclude-module "jupyter" \
            --optimize 2 \
            src/lexisync/main.py

      - name: Strip .po / .pot files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "dist\${{ env.APP_NAME }}"
          if (Test-Path $dir) {
            Get-ChildItem -Path $dir -Recurse -Include "*.po","*.pot" | Remove-Item -Force
            if (Get-ChildItem -Path $dir -Recurse -Include "*.po","*.pot") {
              Write-Error "Error: residual .po/.pot files remain in $dir"
            }
          }

      - name: Strip .po / .pot files (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dir="dist/${{ env.APP_NAME }}"
          [ -d "$dir" ] || exit 1
          find "$dir" -type f \( -name "*.po" -o -name "*.pot" \) -delete
          if find "$dir" -type f \( -name "*.po" -o -name "*.pot" \) | grep -q .; then
            echo "Error: residual .po/.pot files remain in $dir"
            exit 1
          fi

      - name: Replace Python runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "python_minimal"
          $dist = "dist\${{ env.APP_NAME }}"
          $dlls = @(
            "python.exe",
            "pythonw.exe",
            "python3.dll",
            "python312.dll",
            "vcruntime140.dll",
            "vcruntime140_1.dll"
          )
          foreach ($file in $dlls) {
            $sourceFile = Join-Path $src $file
            if (Test-Path $sourceFile) {
              Copy-Item $sourceFile $dist -Force
              Write-Host "Replaced in ${dist}: $file"
            }
          }

      - name: Sign executable (Windows)
        if: runner.os == 'Windows' && env.HAS_WIN_CERT == 'true'
        shell: pwsh
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERT_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:CERT_B64)
          [System.IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe"
          $target = "dist\${{ env.APP_NAME }}\${{ env.APP_NAME }}.exe"
          & $signtool sign /fd sha256 /td sha256 /tr http://timestamp.digicert.com `
            /f cert.pfx /p $env:CERT_PWD "$target"
          if ($LASTEXITCODE -ne 0) { throw "signtool failed for $target" }
          Remove-Item cert.pfx -Force
          Write-Host "::notice::Signed: $target"

      - name: Sign and notarize app bundle (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        shell: bash
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_CERT" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERT_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security list-keychains -d user -s build.keychain

          SIGNING_IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" \
            | head -1 \
            | sed 's/.*"\(.*\)"/\1/')
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' certificate found in build.keychain."
            exit 1
          fi

          codesign --deep --force --verify --verbose \
            --sign "$SIGNING_IDENTITY" \
            --options runtime \
            "dist/${{ env.APP_NAME }}.app"

          ditto -c -k --keepParent "dist/${{ env.APP_NAME }}.app" _notarize.zip
          xcrun notarytool submit _notarize.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PWD" \
            --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "dist/${{ env.APP_NAME }}.app"
          rm cert.p12 _notarize.zip
          echo "::notice::App bundle signed and notarized."

      - name: Package portable ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = "${{ env.APP_NAME }}-${{ env.VERSION_TAG }}-windows-x64-portable.zip"
          Push-Location "dist\${{ env.APP_NAME }}"
          Compress-Archive -Path * -DestinationPath "..\..\$out"
          Pop-Location
          Write-Host "Created: $out"

      - name: Generate Inno Setup script
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $appName = "${{ env.APP_NAME }}"
          $ver = "${{ env.VERSION_NUM }}"
          $repo = "${{ github.repository }}"
          $outName = "${appName}-${{ env.VERSION_TAG }}-windows-x64-setup"

          @(
            "[Setup]",
            "AppName=${appName}",
            "AppVersion=${ver}",
            "AppPublisher=${appName} Project",
            "AppPublisherURL=https://github.com/${repo}",
            "AppSupportURL=https://github.com/${repo}/issues",
            "DefaultDirName={autopf}\${appName}",
            "DefaultGroupName=${appName}",
            "AllowNoIcons=yes",
            "OutputDir=.",
            "OutputBaseFilename=${outName}",
            "Compression=lzma2/ultra64",
            "SolidCompression=yes",
            "PrivilegesRequired=lowest",
            "ArchitecturesInstallIn64BitMode=x64compatible",
            "WizardStyle=modern",
            "DisableWelcomePage=yes",
            "LicenseFile=LICENSE",
            "UninstallDisplayIcon={app}\${appName}.exe",
            "",
            "[Languages]",
            'Name: "english"; MessagesFile: "compiler:Default.isl"',
            "",
            "[Tasks]",
            'Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked',
            "",
            "[Files]",
            "Source: ""dist\${appName}\*""; DestDir: ""{app}""; Flags: ignoreversion recursesubdirs createallsubdirs",
            "",
            "[Icons]",
            "Name: ""{group}\${appName}""; Filename: ""{app}\${appName}.exe""",
            "Name: ""{group}\{cm:UninstallProgram,${appName}}""; Filename: ""{uninstallexe}""",
            "Name: ""{userdesktop}\${appName}""; Filename: ""{app}\${appName}.exe""; Tasks: desktopicon",
            "",
            "[Run]",
            "Filename: ""{app}\${appName}.exe""; Description: ""{cm:LaunchProgram,${appName}}""; Flags: nowait postinstall skipifsilent"
          ) -join "`n" | Set-Content installer.iss -Encoding UTF8

      - name: Compile Inno Setup installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed." }
          $exe = "${{ env.APP_NAME }}-${{ env.VERSION_TAG }}-windows-x64-setup.exe"
          Write-Host "Created: $exe"

      - name: Sign installer (Windows)
        if: runner.os == 'Windows' && env.HAS_WIN_CERT == 'true'
        shell: pwsh
        env:
          CERT_B64: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERT_PWD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:CERT_B64)
          [System.IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          $signtool = "C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe"
          $target = "${{ env.APP_NAME }}-${{ env.VERSION_TAG }}-windows-x64-setup.exe"
          & $signtool sign /fd sha256 /td sha256 /tr http://timestamp.digicert.com `
            /f cert.pfx /p $env:CERT_PWD "$target"
          if ($LASTEXITCODE -ne 0) { throw "signtool failed for $target" }
          Remove-Item cert.pfx -Force
          Write-Host "::notice::Signed: $target"

      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_BUNDLE="dist/${{ env.APP_NAME }}.app"
          OUT="${{ env.APP_NAME }}-${{ env.VERSION_TAG }}-macos-${{ matrix.arch_display }}.dmg"

          MAX=30
          WAITED=0
          while lsof +D "$APP_BUNDLE" >/dev/null 2>&1 && [ $WAITED -lt $MAX ]; do
            echo "Waiting for file handles (${WAITED}/${MAX}s)..."
            sleep 2
            WAITED=$((WAITED + 2))
          done
          if [ $WAITED -ge $MAX ]; then
            echo "Timed out waiting for file handles:"
            lsof +D "$APP_BUNDLE"
            exit 1
          fi

          hdiutil create \
            -volname "${{ env.APP_NAME }}" \
            -srcfolder "$APP_BUNDLE" \
            -ov -format UDZO \
            "$OUT"
          echo "Created: $OUT"

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libfuse2 fakeroot dpkg-dev

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          DIST="dist/${{ env.APP_NAME }}"
          APPDIR="$RUNNER_TEMP/AppDir"
          OUT="${{ env.APP_NAME }}-${{ env.VERSION_TAG }}-linux-${{ matrix.arch_display }}.AppImage"

          curl -fsSL -o "$RUNNER_TEMP/appimagetool" \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x "$RUNNER_TEMP/appimagetool"

          mkdir -p "$APPDIR/usr/lib/${{ env.APP_ID }}"
          cp -r "$DIST"/. "$APPDIR/usr/lib/${{ env.APP_ID }}/"

          {
            echo '#!/bin/bash'
            echo 'SELF="$(readlink -f "$0")"'
            echo 'HERE="${SELF%/*}"'
            echo 'exec "${HERE}/usr/lib/lexisync/LexiSync" "$@"'
          } > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          {
            echo '[Desktop Entry]'
            echo 'Name=LexiSync'
            echo 'Exec=LexiSync'
            echo 'Icon=lexisync'
            echo 'Type=Application'
            echo 'Categories=Utility;'
          } > "$APPDIR/${{ env.APP_ID }}.desktop"

          if [ -f "src/lexisync/resources/icons/app-icon.png" ]; then
            cp "src/lexisync/resources/icons/app-icon.png" "$APPDIR/${{ env.APP_ID }}.png"
          else
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d > "$APPDIR/${{ env.APP_ID }}.png"
          fi

          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 \
            "$RUNNER_TEMP/appimagetool" "$APPDIR" "$OUT"
          echo "Created: $OUT"

      - name: Build .deb package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          NUM="${{ env.VERSION_NUM }}"
          DIST="dist/${{ env.APP_NAME }}"
          DEB="${{ env.APP_ID }}_${NUM}_amd64"

          mkdir -p "$DEB/DEBIAN"
          mkdir -p "$DEB/usr/lib/${{ env.APP_ID }}"
          mkdir -p "$DEB/usr/bin"
          mkdir -p "$DEB/usr/share/applications"
          mkdir -p "$DEB/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$DEB/usr/share/doc/${{ env.APP_ID }}"

          cp -r "$DIST"/. "$DEB/usr/lib/${{ env.APP_ID }}/"

          if [ -f LICENSE ]; then
            cp LICENSE "$DEB/usr/share/doc/${{ env.APP_ID }}/copyright"
          fi

          ln -s "/usr/lib/${{ env.APP_ID }}/${{ env.APP_NAME }}" \
            "$DEB/usr/bin/${{ env.APP_ID }}"

          {
            echo '[Desktop Entry]'
            echo 'Name=LexiSync'
            echo 'Comment=Localization editor and workflow tool'
            echo 'Exec=/usr/lib/lexisync/LexiSync'
            echo 'Icon=lexisync'
            echo 'Type=Application'
            echo 'Categories=Utility;'
            echo 'StartupNotify=true'
          } > "$DEB/usr/share/applications/${{ env.APP_ID }}.desktop"

          if [ -f "src/lexisync/resources/icons/app-icon.png" ]; then
            cp "src/lexisync/resources/icons/app-icon.png" \
              "$DEB/usr/share/icons/hicolor/256x256/apps/${{ env.APP_ID }}.png"
          else
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d \
              > "$DEB/usr/share/icons/hicolor/256x256/apps/${{ env.APP_ID }}.png"
          fi

          INSTALLED_KB=$(du -sk "$DEB/usr" | cut -f1)
          {
            echo 'Package: ${{ env.APP_ID }}'
            echo "Version: ${NUM}"
            echo 'Architecture: amd64'
            echo 'Maintainer: LexiSync Project <noreply@github.com>'
            echo "Installed-Size: ${INSTALLED_KB}"
            echo 'Depends: libgl1'
            echo 'Homepage: https://github.com/${{ github.repository }}'
            echo 'Description: LexiSync'
            echo ' Localization editor and workflow tool for multilingual projects.'
          } > "$DEB/DEBIAN/control"

          printf '#!/bin/sh\nupdate-desktop-database /usr/share/applications || true\n' \
            > "$DEB/DEBIAN/postinst"
          printf '#!/bin/sh\nupdate-desktop-database /usr/share/applications || true\n' \
            > "$DEB/DEBIAN/postrm"
          chmod 0755 "$DEB/DEBIAN/postinst" "$DEB/DEBIAN/postrm"

          fakeroot dpkg-deb --build "$DEB" \
            "${{ env.APP_ID }}_${NUM}_amd64.deb"
          echo "Created: ${{ env.APP_ID }}_${NUM}_amd64.deb"

      - name: Build tar.gz (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          OUT="${{ env.APP_NAME }}-${{ env.VERSION_TAG }}-linux-${{ matrix.arch_display }}.tar.gz"
          tar -czf "$OUT" -C dist/ "${{ env.APP_NAME }}"
          echo "Created: $OUT"

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows-x64
          path: |
            ${{ env.APP_NAME }}-${{ env.VERSION_TAG }}-windows-x64-setup.exe
            ${{ env.APP_NAME }}-${{ env.VERSION_TAG }}-windows-x64-portable.zip

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: pkg-macos-${{ matrix.arch_display }}
          path: ${{ env.APP_NAME }}-${{ env.VERSION_TAG }}-macos-${{ matrix.arch_display }}.dmg

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux-x64
          path: |
            ${{ env.APP_NAME }}-${{ env.VERSION_TAG }}-linux-${{ matrix.arch_display }}.AppImage
            ${{ env.APP_ID }}_${{ env.VERSION_NUM }}_amd64.deb
            ${{ env.APP_NAME }}-${{ env.VERSION_TAG }}-linux-${{ matrix.arch_display }}.tar.gz

  release:
    name: Publish GitHub Release
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION_TAG: ${{ needs.setup.outputs.version_tag }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pkg-*

      - name: Flatten artifact tree and generate SHA256SUMS.txt
        shell: bash
        run: |
          mkdir release_assets
          find artifacts -type f | sort | while read -r f; do
            dest="release_assets/$(basename "$f")"
            if [ -e "$dest" ]; then
              echo "::error::Filename collision detected: '$(basename "$f")' exists in multiple artifact packages."
              exit 1
            fi
            cp "$f" "$dest"
          done

          cd release_assets
          sha256sum * | sort > SHA256SUMS.txt

          echo "-- Release assets --"
          ls -lh
          echo ""
          echo "-- SHA256SUMS.txt --"
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          generate_release_notes: true
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') || contains(env.VERSION_TAG, 'alpha') || contains(env.VERSION_TAG, 'beta') || contains(env.VERSION_TAG, 'rc') }}
          files: release_assets/*